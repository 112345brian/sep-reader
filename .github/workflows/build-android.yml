name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      flavor:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - test
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Enable test build flag
        if: inputs.flavor == 'test'
        run: sed -i 's/IS_TEST_BUILD = false/IS_TEST_BUILD = true/' src/testConfig.ts

      - name: Set up release keystore
        if: inputs.flavor == 'release'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/nous-release.keystore

      - name: Write keystore.properties
        if: inputs.flavor == 'release'
        run: |
          cat > android/keystore.properties <<EOF
          storeFile=nous-release.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          if [ "${{ inputs.flavor }}" = "release" ]; then
            ./gradlew assembleRelease --no-daemon
          else
            ./gradlew assembleDebug --no-daemon
          fi

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          FLAVOR="${{ inputs.flavor || 'debug' }}"
          if [ "$FLAVOR" = "release" ]; then
            mv android/app/build/outputs/apk/release/app-release.apk \
               nous-${{ steps.version.outputs.version }}-release.apk
          else
            mv android/app/build/outputs/apk/debug/app-debug.apk \
               nous-${{ steps.version.outputs.version }}-${FLAVOR}.apk
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Nous v${{ steps.version.outputs.version }}
          body: |
            Built from `${{ github.sha }}` · ${{ github.event.head_commit.message || 'manual build' }}
          files: nous-*.apk
          make_latest: true
